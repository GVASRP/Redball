<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Red Ball 5</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; user-select: none; }
        #controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .touch-zone { pointer-events: auto; position: absolute; }
        /* Зоны нажатия (прозрачные) */
        #left-z { bottom: 20px; left: 20px; width: 140px; height: 120px; }
        #right-z { bottom: 20px; left: 180px; width: 140px; height: 120px; }
        #jump-z { bottom: 30px; right: 30px; width: 150px; height: 150px; }
    </style>
</head>
<body>
    <div id="controls">
        <div id="left-z" class="touch-zone"></div>
        <div id="right-z" class="touch-zone"></div>
        <div id="jump-z" class="touch-zone"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
