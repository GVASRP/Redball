<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Ball 5 Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; touch-action: none; }
        #controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; user-select: none; -webkit-user-select: none;
        }
        #jump-btn { background: rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>
    <div id="controls">
        <div style="display: flex; gap: 20px;">
            <div id="left-btn" class="btn">◀</div>
            <div id="right-btn" class="btn">▶</div>
        </div>
        <div id="jump-btn" class="btn">▲</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
