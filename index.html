<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Red Ball 5 Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
    body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
    #controls {
        position: absolute; bottom: 30px; width: 100%;
        display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box;
        pointer-events: none; /* Чтобы не мешать игре */
    }
    .btn {
        width: 90px; height: 90px; 
        border: 3px solid rgba(255,255,255,0.4);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 40px; color: rgba(255,255,255,0.6); 
        pointer-events: auto; background: transparent;
    }
    #jump-btn { width: 100px; height: 100px; border-color: rgba(255,255,255,0.3); }
        </style>
    
</head>
<body>
    <div id="controls">
        <div style="display: flex; gap: 20px;">
            <div id="left-btn" class="btn">◀</div>
            <div id="right-btn" class="btn">▶</div>
        </div>
        <div id="jump-btn" class="btn">▲</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
